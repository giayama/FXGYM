<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<!-- ★ Favicon / 書籤圖示 -->
<link rel="icon" type="image/jpeg" href="https://raw.githubusercontent.com/giayama/FXGYM/main/logo.jpg">
<link rel="apple-touch-icon" href="https://raw.githubusercontent.com/giayama/FXGYM/main/logo.jpg">
<meta name="theme-color" content="#0f0f0f">
<title>福星健客</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Bebas+Neue&family=DM+Mono:wght@400;500&family=ZCOOL+XiaoWei&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
button, a, [onclick] { touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #222;
  --accent: #c8f135; --accent2: #f1c535; --accent3: #35c8f1;
  --text: #f0ede6; --muted: #777; --border: rgba(255,255,255,0.07);
}
body { background: var(--bg); color: var(--text); font-family: 'Noto Sans TC', sans-serif; font-size: 15px; line-height: 1.7; }

/* LAYOUT */
.app { display: flex; min-height: 100vh; }

/* SIDEBAR */

/* LOGO & TITLE */
.sidebar-logo-wrap {
  position: sticky; top: 0; z-index: 10;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.logo-img-wrap {
  padding: 16px 20px 10px;
  display: flex; justify-content: center;
}
.logo-img {
  width: 72px; height: 72px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid rgba(200,241,53,0.3);
  box-shadow: 0 0 16px rgba(200,241,53,0.1);
}
.logo-title {
  text-align: center;
  font-family: 'Ma Shan Zheng', 'ZCOOL XiaoWei', 'Noto Sans TC', serif;
  font-size: 26px;
  font-weight: 900;
  letter-spacing: 0.15em;
  color: var(--text);
  padding: 0 12px 16px;
  line-height: 1.2;
  text-shadow: 0 2px 8px rgba(200,241,53,0.2);
}
.logo-title span { color: var(--accent); }

.sidebar {
  width: 260px; flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  position: fixed; top: 0; left: 0; height: 100vh;
  overflow-y: auto;
  z-index: 100;
}
.sidebar-header {
  padding: 28px 20px 20px;
  border-bottom: 1px solid var(--border);
}
.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 30px; letter-spacing: 0.04em;
  line-height: 1;
}
.logo span { color: var(--accent); }
.logo-sub {
  font-family: 'DM Mono', monospace;
  font-size: 10px; color: var(--muted);
  letter-spacing: 0.1em; text-transform: uppercase;
  margin-top: 4px;
}
.session-list { padding: 12px 0; flex: 1; }
.session-item {
  padding: 12px 20px;
  cursor: pointer;
  border-left: 3px solid transparent;
  transition: all 0.15s;
  position: relative;
}
.session-item:hover { background: rgba(255,255,255,0.04); }
.session-item.active {
  background: rgba(200,241,53,0.07);
  border-left-color: var(--accent);
}
.session-date {
  font-family: 'DM Mono', monospace;
  font-size: 13px; font-weight: 500;
  color: var(--text);
}
.session-item.active .session-date { color: var(--accent); }
.session-count {
  font-size: 11px; color: var(--muted); margin-top: 2px;
}
.session-tags {
  display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px;
}
.mini-tag {
  font-size: 9px; padding: 1px 5px; border-radius: 10px;
  background: rgba(255,255,255,0.06); color: var(--muted);
  letter-spacing: 0.03em;
}
/* ── MOBILE IMPROVEMENTS ─────────────────────────── */
.sidebar-footer {
  padding: 16px 20px;
  border-top: 1px solid var(--border);
  font-family: 'DM Mono', monospace;
  font-size: 10px; color: var(--muted);
  letter-spacing: 0.06em;
}
.total-sessions { font-size: 18px; color: var(--accent); font-weight: 500; font-family: 'Bebas Neue'; }

/* MAIN */
.main {
  margin-left: 260px;
  flex: 1;
  min-height: 100vh;
}

/* TOPBAR */
.topbar {
  padding: 20px 32px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 16px;
  background: var(--bg);
  position: sticky; top: 0; z-index: 50;
}
.topbar-date {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 36px; line-height: 1; letter-spacing: 0.04em;
}
.topbar-badge {
  font-family: 'DM Mono', monospace; font-size: 11px;
  background: rgba(200,241,53,0.1); color: var(--accent);
  border: 1px solid rgba(200,241,53,0.2);
  padding: 4px 10px; border-radius: 20px;
  letter-spacing: 0.06em;
}
.nav-btns { margin-left: auto; display: flex; gap: 8px; }
.nav-btn {
  background: var(--surface); border: 1px solid var(--border);
  color: var(--muted); padding: 6px 14px; border-radius: 6px;
  cursor: pointer; font-size: 13px; transition: all 0.15s;
  font-family: 'DM Mono', monospace;
}
.nav-btn:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }
.nav-btn:disabled { opacity: 0.3; cursor: default; }

/* CONTENT */
.content { padding: 28px 32px 48px; }

/* STATS ROW */
.stats-row {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 10px; margin-bottom: 28px;
}
.stat-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 14px 16px;
}
.stat-num {
  font-family: 'Bebas Neue', monospace;
  font-size: 28px; color: var(--accent); line-height: 1;
}
.stat-lbl {
  font-size: 10px; color: var(--muted); margin-top: 3px;
  text-transform: uppercase; letter-spacing: 0.08em;
}

/* SECTION LABEL */
.sec-label {
  font-family: 'DM Mono', monospace; font-size: 10px;
  color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase;
  display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
}
.sec-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* SPECIAL ROW */
.special-row {
  background: rgba(200,241,53,0.04); border: 1px solid rgba(200,241,53,0.1);
  border-radius: 8px; padding: 12px 16px; margin-bottom: 20px;
  display: flex; align-items: center; gap: 12px;
  font-size: 13px; color: rgba(200,241,53,0.7);
}
.special-row::before { content: '●'; font-size: 8px; }

/* EXERCISE CARDS */
.exercise-grid { display: flex; flex-direction: column; gap: 10px; }
.ex-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; overflow: hidden;
  transition: border-color 0.15s;
}
.ex-card:hover { border-color: rgba(255,255,255,0.15); }
.ex-header {
  display: flex; align-items: flex-start; gap: 14px;
  padding: 16px 18px 14px; cursor: pointer;
}
.ex-num {
  font-family: 'Bebas Neue', monospace; font-size: 24px;
  color: rgba(255,255,255,0.12); line-height: 1; flex-shrink: 0; width: 24px;
}
.ex-info { flex: 1; min-width: 0; }
.ex-name { font-size: 15px; font-weight: 500; }
.ex-name-en { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); margin-top: 2px; }
.ex-meta { display: flex; align-items: center; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
.tag {
  font-size: 10px; font-weight: 500; padding: 2px 8px;
  border-radius: 20px; letter-spacing: 0.03em;
}
.t-ab    { background: #1e2e07; color: #a8d420; }
.t-leg   { background: #071e2e; color: #20c4d4; }
.t-back  { background: #1e0730; color: #b420d4; }
.t-cardio{ background: #2e1807; color: #d45020; }
.t-core  { background: #0a2210; color: #30d460; }
.t-chest { background: #2a1520; color: #d45090; }
.t-full  { background: #1a1a2e; color: #8888ee; }
.t-other { background: #222; color: #888; }
.reps {
  font-family: 'DM Mono', monospace; font-size: 11px;
  color: var(--accent2); background: rgba(241,197,53,0.1);
  padding: 2px 8px; border-radius: 20px;
}
.ex-body { padding: 0 18px 16px 56px; display: none; }
.ex-body.open { display: block; }
.ex-desc { font-size: 13px; color: rgba(240,237,230,0.65); line-height: 1.75; }
.ex-note {
  margin-top: 8px; font-size: 12px; color: var(--muted);
  border-left: 2px solid var(--accent); padding-left: 8px; line-height: 1.5;
}
.ex-link {
  display: inline-flex; align-items: center; gap: 5px;
  margin-top: 10px; font-size: 12px; color: var(--accent3);
  text-decoration: none; font-family: 'DM Mono', monospace; opacity: 0.8;
  transition: opacity 0.15s;
}
.ex-link:hover { opacity: 1; }
.ex-link::before { content: '▶'; font-size: 8px; }
.expand-btn {
  flex-shrink: 0; width: 22px; height: 22px;
  border: 1px solid var(--border); border-radius: 50%;
  background: none; cursor: pointer;
  color: var(--muted); font-size: 10px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; margin-top: 4px;
}
.expand-btn:hover { border-color: var(--accent); color: var(--accent); }
.expand-btn.open { border-color: rgba(200,241,53,0.4); color: var(--accent); transform: rotate(180deg); }

/* STRETCH */
.stretch-card {
  background: rgba(53,200,241,0.04); border: 1px solid rgba(53,200,241,0.1);
  border-radius: 8px; padding: 14px 18px; margin-top: 20px;
  display: flex; align-items: center; gap: 12px;
  font-size: 13px; color: rgba(53,200,241,0.7);
}

/* OVERVIEW PANEL */
.overview { display: none; padding: 28px 32px 48px; }
.overview.active { display: block; }
.overview-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 12px; margin-top: 20px;
}
.ov-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 16px; cursor: pointer;
  transition: all 0.15s;
}
.ov-card:hover { border-color: rgba(200,241,53,0.3); background: rgba(200,241,53,0.04); }
.ov-date {
  font-family: 'Bebas Neue', sans-serif; font-size: 22px;
  color: var(--accent); letter-spacing: 0.04em;
}
.ov-count { font-size: 12px; color: var(--muted); margin: 4px 0 10px; }
.ov-tags { display: flex; flex-wrap: wrap; gap: 5px; }
.frequency-chart {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 20px; margin-bottom: 24px;
}
.fc-title {
  font-family: 'DM Mono', monospace; font-size: 11px;
  color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase;
  margin-bottom: 16px;
}
.fc-bars { display: flex; align-items: flex-end; gap: 8px; height: 60px; }
.fc-bar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.fc-bar {
  width: 100%; background: rgba(200,241,53,0.2); border-radius: 3px;
  transition: background 0.15s; cursor: pointer;
}
.fc-bar:hover { background: rgba(200,241,53,0.5); }
.fc-bar.active { background: var(--accent); }
.fc-label { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--muted); text-align: center; }
.fc-num { font-size: 10px; color: var(--muted); }

  /* YOUTUBE SECTION */
.youtube-section {
  margin-top: 0;
  padding: 20px 0 4px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 24px;
}
.youtube-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  max-width: 50%; /* 縮小為頁面寬度的一半 */
}
.youtube-slot { display: flex; flex-direction: column; gap: 6px; }
/* yt-input / yt-edit-btn 已移除，改為 GitHub 資料驅動 */
.yt-embed {
  position: relative; width: 100%;
  padding-bottom: 56.25%;
  background: var(--surface2);
  border-radius: 6px; overflow: hidden;
}
.yt-embed iframe {
  position: absolute; inset: 0;
  width: 100%; height: 100%; border: none;
}
.yt-embed-empty {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  color: rgba(255,255,255,0.1); font-size: 20px;
}
/* YouTube Facade - 支援自訂縮圖 */
.yt-facade {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  cursor: pointer;
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  border-radius: 6px; overflow: hidden;
  gap: 8px;
  -webkit-tap-highlight-color: transparent;
}
.yt-facade-thumb {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  transition: opacity 0.2s;
}
.yt-facade:hover .yt-facade-thumb { opacity: 0.75; }
.yt-facade::before {
  content: '';
  position: absolute; inset: 0; z-index: 1;
  background: radial-gradient(ellipse at center, rgba(0,0,0,0.18) 0%, transparent 70%);
}
.yt-play-btn {
  position: relative; z-index: 2;
  width: 48px; height: 34px;
  background: #ff0000; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s, transform 0.15s;
  box-shadow: 0 3px 14px rgba(255,0,0,0.5);
}
.yt-facade:active .yt-play-btn {
  background: #cc0000; transform: scale(0.94);
}
.yt-play-btn::after {
  content: '';
  border-style: solid;
  border-width: 7px 0 7px 14px;
  border-color: transparent transparent transparent #fff;
  margin-left: 4px;
}
.yt-facade-label {
  position: relative; z-index: 2;
  font-family: 'DM Mono', monospace;
  font-size: 10px; color: rgba(255,255,255,0.55);
  letter-spacing: 0.08em;
  text-shadow: 0 1px 4px rgba(0,0,0,0.8);
}
@media (max-width: 1024px) {
  .youtube-grid { max-width: 60%; }
}
@media (max-width: 768px) {
  .youtube-grid { grid-template-columns: 1fr 1fr; max-width: 100%; }
}
@media (max-width: 500px) {
  .youtube-grid { grid-template-columns: 1fr; max-width: 100%; }
}

/* 側欄相簿指示點 */
.album-dot {
  display: inline-block; width: 6px; height: 6px;
  background: var(--accent3); border-radius: 50%;
  margin-left: 6px; vertical-align: middle;
  box-shadow: 0 0 5px rgba(53,200,241,0.6);
}

/* MOBILE OVERLAY */
.sidebar-overlay {
  display: none;
  position: fixed; inset: 0; z-index: 99;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(2px);
  -webkit-backdrop-filter: blur(2px);
}
.sidebar-overlay.active { display: block; }

/* MOBILE NAV FAB */
.mobile-menu-btn {
  display: none;
  position: fixed; bottom: 24px; right: 24px;
  width: 52px; height: 52px; border-radius: 50%;
  background: var(--accent); color: #000; border: none;
  font-size: 22px; cursor: pointer; z-index: 200;
  align-items: center; justify-content: center;
  box-shadow: 0 4px 20px rgba(200,241,53,0.4);
  transition: transform 0.2s, box-shadow 0.2s;
  -webkit-tap-highlight-color: transparent;
}
.mobile-menu-btn:active {
  transform: scale(0.92);
  box-shadow: 0 2px 8px rgba(200,241,53,0.3);
}

/* TABLET (768px - 1024px) */
@media (max-width: 1024px) {
  .sidebar { width: 220px; }
  .main { margin-left: 220px; }
  .topbar { padding: 16px 24px; }
  .content, .overview { padding: 20px 24px 60px; }
  .stats-row { grid-template-columns: repeat(2, 1fr); gap: 8px; }
  .topbar-date { font-size: 30px; }
  .youtube-grid { grid-template-columns: 1fr; }
  .overview-grid { grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); }
}

/* MOBILE (≤ 768px) */
@media (max-width: 768px) {
  /* Sidebar slides in as drawer */
  .sidebar {
    transform: translateX(-100%);
    transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
    width: 82vw; max-width: 300px;
    z-index: 100;
  }
  .sidebar.open { transform: translateX(0); }

  /* Logo sizing */
  .logo-img { width: 58px; height: 58px; }
  .logo-title { font-size: 22px; }

  /* Session items - bigger touch targets */
  .session-item { padding: 14px 18px; }
  .session-date { font-size: 14px; }

  /* Main takes full width */
  .main { margin-left: 0; }

  /* Topbar */
  .topbar {
    padding: 12px 16px;
    flex-wrap: wrap;
    gap: 10px;
    position: sticky; top: 0; z-index: 50;
  }
  .topbar-date { font-size: 26px; }
  .topbar-badge { font-size: 10px; padding: 3px 8px; }
  .nav-btns { margin-left: auto; gap: 6px; }
  .nav-btn { padding: 6px 10px; font-size: 12px; }

  /* Content */
  .content, .overview { padding: 14px 14px 80px; }

  /* Stats: 2x2 grid */
  .stats-row {
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
    margin-bottom: 20px;
  }
  .stat-card { padding: 12px 14px; }
  .stat-num { font-size: 24px; }

  /* Exercise cards */
  .ex-header { padding: 14px 14px 12px; gap: 10px; }
  .ex-num { font-size: 20px; width: 20px; }
  .ex-name { font-size: 14px; }
  .ex-body { padding: 0 14px 14px 44px; }

  /* Photo grid: 2 columns on mobile */
  .photo-grid { grid-template-columns: repeat(2, 1fr); gap: 6px; }

  /* YouTube: single column */
  .youtube-grid { grid-template-columns: 1fr; gap: 16px; }
  .youtube-section { padding: 16px 0 4px; margin-bottom: 18px; }

  /* Overview */
  .overview-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .ov-card { padding: 12px; }
  .ov-date { font-size: 18px; }

  /* Frequency chart: smaller */
  .fc-bars { gap: 5px; height: 50px; }
  .fc-label { font-size: 8px; }

  /* Show FAB */
  .mobile-menu-btn { display: flex; }

  /* Special row */
  .special-row { font-size: 12px; padding: 10px 14px; }
  .stretch-card { font-size: 12px; padding: 12px 14px; }

  /* Lightbox nav buttons bigger on mobile */
  .lightbox-prev { left: 8px; }
  .lightbox-next { right: 8px; }
  .lightbox-nav { width: 40px; height: 40px; font-size: 20px; }
  .lightbox-img { max-width: 96vw; max-height: 80vh; }
  .lightbox-close { top: 12px; right: 12px; }

  /* Album input on mobile */
  .album-input-row { flex-direction: column; }

  /* Topbar overview page padding */
  .overview .topbar { padding: 12px 14px; }
  #overviewContent { padding: 14px 14px 80px; }
}

/* SMALL MOBILE (≤ 400px) */
@media (max-width: 400px) {
  .stats-row { grid-template-columns: repeat(2, 1fr); }
  .topbar-date { font-size: 22px; }
  .overview-grid { grid-template-columns: 1fr; }
  .nav-btn { padding: 5px 8px; font-size: 11px; }
  .photo-grid { grid-template-columns: repeat(2, 1fr); }
}

/* PHOTO SECTION */
.photo-section {
  margin-top: 28px;
  border-top: 1px solid var(--border);
  padding-top: 24px; padding-bottom: 8px;
}
.photo-section-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px;
}
/* 空白佔位 */
.photo-empty {
  border: 1.5px dashed rgba(255,255,255,0.1);
  border-radius: 12px; padding: 32px 20px;
  text-align: center; color: var(--muted);
}
.photo-empty-icon { font-size: 28px; margin-bottom: 8px; opacity: 0.4; }
.photo-empty-text { font-size: 13px; }
.photo-empty-hint { font-size: 11px; color: rgba(119,119,119,0.5); margin-top: 4px; font-family: 'DM Mono', monospace; }

/* 照片網格 */
.photo-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}
.photo-cell {
  aspect-ratio: 1; border-radius: 8px; overflow: hidden;
  background: var(--surface2); position: relative; cursor: pointer;
}
.photo-cell img {
  width: 100%; height: 100%; object-fit: cover;
  transition: transform 0.25s, opacity 0.2s;
  display: block;
}
.photo-cell:hover img { transform: scale(1.06); opacity: 0.85; }
.photo-cell-empty {
  aspect-ratio: 1; border-radius: 8px;
  border: 1.5px dashed rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.01);
  display: flex; align-items: center; justify-content: center;
  color: rgba(255,255,255,0.08); font-size: 20px;
}
.photo-status {
  font-family: 'DM Mono', monospace; font-size: 10px;
  color: var(--muted); text-align: right;
  margin-top: 8px; letter-spacing: 0.05em;
}
.photo-status a {
  color: var(--accent3); text-decoration: none; opacity: 0.7;
  transition: opacity 0.15s;
}
.photo-status a:hover { opacity: 1; }

/* 燈箱 */
.lightbox {
  display: none; position: fixed; inset: 0; z-index: 999;
  background: rgba(0,0,0,0.93);
  align-items: center; justify-content: center; cursor: zoom-out;
  opacity: 0; transition: opacity 0.2s;
}
.lightbox.open { opacity: 1; }
.lightbox-img {
  max-width: 90vw; max-height: 88vh;
  border-radius: 8px; object-fit: contain; cursor: default;
}
.lightbox-close {
  position: fixed; top: 20px; right: 24px;
  background: rgba(255,255,255,0.1); border: none;
  color: #fff; font-size: 18px; width: 38px; height: 38px;
  border-radius: 50%; cursor: pointer; z-index: 1000;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
}
.lightbox-close:hover { background: rgba(255,255,255,0.22); }
.lightbox-nav {
  position: fixed; top: 50%; transform: translateY(-50%);
  background: rgba(255,255,255,0.08); border: none;
  color: #fff; font-size: 24px; width: 44px; height: 44px;
  border-radius: 50%; cursor: pointer; z-index: 1000;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s;
}
.lightbox-nav:hover { background: rgba(255,255,255,0.18); }
.lightbox-prev { left: 14px; }
.lightbox-next { right: 14px; }
.lightbox-caption {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  font-family: 'DM Mono', monospace; font-size: 11px;
  color: rgba(255,255,255,0.45); background: rgba(0,0,0,0.45);
  padding: 4px 14px; border-radius: 20px; white-space: nowrap;
}

/* 側欄相簿指示點 */
.album-dot {
  display: inline-block; width: 6px; height: 6px;
  background: var(--accent3); border-radius: 50%;
  margin-left: 6px; vertical-align: middle;
  box-shadow: 0 0 5px rgba(53,200,241,0.6);
}



/* PHOTO SECTION */
.photo-section {
  margin-top: 28px;
  border-top: 1px solid var(--border);
  padding-top: 24px;
  padding-bottom: 8px;
}
.photo-section-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px;
}
/* 空白佔位 */
.photo-empty {
  border: 1.5px dashed rgba(255,255,255,0.1);
  border-radius: 12px; padding: 32px 20px;
  text-align: center; color: var(--muted);
}
.photo-empty-icon { font-size: 28px; margin-bottom: 8px; opacity: 0.4; }
.photo-empty-text { font-size: 13px; }
.photo-empty-hint { font-size: 11px; color: rgba(119,119,119,0.5); margin-top: 4px; font-family: 'DM Mono', monospace; }

/* 相簿連結輸入列 */
.album-input-row {
  display: flex; gap: 8px; margin-bottom: 14px; align-items: stretch;
}
.album-input {
  flex: 1; background: var(--surface2);
  border: 1px solid var(--border); border-radius: 8px;
  color: var(--text); font-size: 13px; font-family: 'DM Mono', monospace;
  padding: 9px 14px; outline: none;
  transition: border-color 0.15s;
}
.album-input::placeholder { color: rgba(119,119,119,0.5); }
.album-input:focus { border-color: rgba(200,241,53,0.4); }
.album-save-btn {
  background: rgba(200,241,53,0.12); border: 1px solid rgba(200,241,53,0.25);
  color: var(--accent); border-radius: 8px; padding: 0 16px;
  font-size: 13px; font-family: 'DM Mono', monospace;
  cursor: pointer; white-space: nowrap; transition: all 0.15s;
}
.album-save-btn:hover { background: rgba(200,241,53,0.2); border-color: rgba(200,241,53,0.5); }
.album-clear-btn {
  background: none; border: 1px solid var(--border);
  color: var(--muted); border-radius: 8px; padding: 0 12px;
  font-size: 12px; cursor: pointer; transition: all 0.15s;
}
.album-clear-btn:hover { border-color: rgba(255,80,80,0.4); color: #ff6060; }

/* 相簿展示區 */
.album-display {
  border-radius: 12px; overflow: hidden;
  border: 1px solid var(--border);
  background: var(--surface2);
}
.album-preview-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.album-preview-title {
  display: flex; align-items: center; gap: 8px;
  font-size: 13px; color: var(--muted);
  font-family: 'DM Mono', monospace;
}
.album-preview-title span { color: var(--accent); font-size: 15px; }
.album-open-link {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 12px; color: var(--accent3); text-decoration: none;
  font-family: 'DM Mono', monospace; opacity: 0.8; transition: opacity 0.15s;
}
.album-open-link:hover { opacity: 1; }
.album-iframe-wrap {
  position: relative; width: 100%;
  padding-bottom: 56.25%; /* 16:9 */
  background: #111;
}
.album-iframe-wrap iframe {
  position: absolute; inset: 0; width: 100%; height: 100%;
  border: none;
}
.album-fallback {
  padding: 28px 20px; text-align: center;
}
.album-fallback-btn {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(200,241,53,0.08); border: 1px solid rgba(200,241,53,0.2);
  color: var(--accent); border-radius: 8px; padding: 10px 20px;
  font-size: 14px; text-decoration: none; transition: all 0.15s;
  font-family: 'Noto Sans TC', sans-serif;
}
.album-fallback-btn:hover { background: rgba(200,241,53,0.16); }
.overview-content-inner { padding: 28px 32px 48px; }
@media (max-width: 768px) {
  .overview-content-inner { padding: 14px 14px 80px; }
}

/* ══════════════════════════════════════════════════
   行動裝置排版改善 (Mobile UX Improvements)
   ══════════════════════════════════════════════════ */

/* ① 字型偏小修正 — mini-tag / sec-label / ex-name-en */
@media (max-width: 768px) {
  .mini-tag {
    font-size: 11px;
    padding: 2px 7px;
  }
  .sec-label {
    font-size: 11px;
    letter-spacing: 0.09em;
  }
  .ex-name-en {
    font-size: 11px;
  }
  .stat-lbl {
    font-size: 11px;
  }
  .logo-sub {
    font-size: 11px;
  }
}

/* ② stats 卡片數字：手機 22px（原 24px 可再微調）*/
@media (max-width: 768px) {
  .stat-num { font-size: 22px; }
}

/* ③ YouTube 格線 — 手機強制單欄（≤768px 已有，加強保險） */
@media (max-width: 768px) {
  .youtube-grid {
    grid-template-columns: 1fr !important;
    max-width: 100% !important;
    gap: 14px;
  }
}

/* ④ topbar 排版優化 — 小螢幕換行更優雅 */
@media (max-width: 768px) {
  .topbar {
    flex-wrap: wrap;
    row-gap: 6px;
    padding: 10px 14px;
    align-items: center;
  }
  .topbar-date {
    font-size: 24px;
    flex: 0 0 auto;
  }
  .topbar-badge {
    font-size: 10px;
    padding: 3px 8px;
    flex: 0 0 auto;
  }
  .nav-btns {
    width: 100%;
    display: flex;
    justify-content: flex-end;
    gap: 6px;
    margin-left: 0;
  }
  .nav-btn {
    padding: 7px 12px;
    font-size: 12px;
    min-height: 36px;         /* 觸控友善 */
  }
}
@media (max-width: 400px) {
  .topbar-date { font-size: 20px; }
  .nav-btn { padding: 7px 10px; font-size: 11px; }
}

/* ⑤ ex-card 觸控區域 — 加大 ex-header padding */
@media (max-width: 768px) {
  .ex-header {
    padding: 16px 16px 14px;
    gap: 12px;
    min-height: 56px;          /* 確保 WCAG 44px 以上 */
  }
  .expand-btn {
    width: 28px;
    height: 28px;
    font-size: 12px;
  }
}

/* ⑥ 照片格 — 已設定 2 欄，確認並加強響應 */
@media (max-width: 768px) {
  .photo-grid {
    grid-template-columns: repeat(2, 1fr) !important;
    gap: 6px;
  }
}

/* ⑦ FAB 按鈕 — 避免與 stretch-card 重疊，提升到更高位置 */
@media (max-width: 768px) {
  .mobile-menu-btn {
    bottom: 28px;
    right: 18px;
    width: 54px;
    height: 54px;
    font-size: 22px;
  }
  /* stretch-card 底部加 padding，防止被 FAB 遮擋 */
  .stretch-card {
    margin-bottom: 80px;
  }
}

/* ⑧ stretch-card / special-row — 行距放寬 */
@media (max-width: 768px) {
  .stretch-card {
    font-size: 12px;
    line-height: 1.7;
    padding: 13px 16px;
  }
  .special-row {
    font-size: 12px;
    line-height: 1.7;
    padding: 11px 14px;
  }
}

/* ⑨ overview-grid ov-date — ≤400px 更清晰 */
@media (max-width: 400px) {
  .ov-date {
    font-size: 20px;
    letter-spacing: 0.06em;
  }
  .ov-count {
    font-size: 11px;
  }
}

/* ⑩ session-item 觸控時 active 視覺回饋動畫 */
.session-item {
  /* 原有 transition: all 0.15s 已存在，加強觸控 feedback */
  -webkit-tap-highlight-color: transparent;
}
.session-item:active {
  background: rgba(200, 241, 53, 0.14);
  border-left-color: var(--accent);
  transform: scale(0.98);
  transition: transform 0.08s ease, background 0.08s ease;
}
/* 手機端給 session-item 更大觸控高度 */
@media (max-width: 768px) {
  .session-item {
    padding: 15px 18px;
    transition: background 0.15s, border-left-color 0.15s, transform 0.08s;
  }
  .session-item:active {
    transform: scale(0.97);
    background: rgba(200, 241, 53, 0.18);
  }
  /* active 狀態保持高亮 */
  .session-item.active {
    background: rgba(200, 241, 53, 0.1);
  }
}

</style>

const TAG_MAP = {
  '腹': 't-ab', '腹部': 't-ab',
  '腿': 't-leg', '腿部': 't-leg', '下肢': 't-leg',
  '背': 't-back', '背部': 't-back', '上背肌': 't-back', '臀中肌': 't-back',
  '心肺': 't-cardio',
  '核心': 't-core', '全身/核心': 't-core',
  '胸': 't-chest',
  '全身': 't-full',
};

function getTagClass(body) {
  if (!body) return 't-other';
  for (const k of Object.keys(TAG_MAP)) {
    if (body.includes(k)) return TAG_MAP[k];
  }
  return 't-other';
}

function getUniqBodies(exercises) {
  const seen = new Set();
  return exercises.map(e => e.body).filter(b => { if (!b || seen.has(b)) return false; seen.add(b); return true; }).slice(0, 4);
}

let currentIdx = 0;

function renderSidebar() {
  const list = document.getElementById('sessionList');
  list.innerHTML = SESSIONS.map((s, i) => `
    <div class="session-item ${i === currentIdx ? 'active' : ''}" id="si-${i}" onclick="gotoSession(${i})">
      <div class="session-date">${s.label}</div>
      <div class="session-count">${s.exercises.length} 個動作</div>
      <div class="session-tags">
        ${getUniqBodies(s.exercises).map(b => `<span class="mini-tag">${b || '綜合'}</span>`).join('')}
      </div>
    </div>
  `).join('');
  document.getElementById('totalSessions').textContent = SESSIONS.length;

}

function renderSession(idx) {
  const s = SESSIONS[idx];
  document.getElementById('topbarDate').textContent = s.label;
  document.getElementById('topbarBadge').textContent = `${s.exercises.length} 個動作`;
  document.getElementById('btnPrev').disabled = idx >= SESSIONS.length - 1;
  document.getElementById('btnNext').disabled = idx <= 0;

  const bodies = getUniqBodies(s.exercises);
  const statsHtml = `
    <div class="stats-row">
      <div class="stat-card"><div class="stat-num">${s.exercises.length}</div><div class="stat-lbl">動作數量</div></div>
      <div class="stat-card"><div class="stat-num">${bodies.length || '—'}</div><div class="stat-lbl">訓練部位</div></div>
      <div class="stat-card"><div class="stat-num">${s.exercises.filter(e => e.link).length}</div><div class="stat-lbl">附影片</div></div>
      <div class="stat-card"><div class="stat-num">#${SESSIONS.length - idx}</div><div class="stat-lbl">第幾次</div></div>
    </div>`;

  const exHtml = s.exercises.map(e => {
    const tagCls = getTagClass(e.body);
    const hasDetail = e.desc || e.note || e.link;

        <div class="ex-num">${String(e.num).padStart(2,'0')}</div>

          <div class="ex-name">${e.name}</div>
          ${e.nameEn ? `<div class="ex-name-en">${e.nameEn}</div>` : ''}

            ${e.body ? `<span class="tag ${tagCls}">${e.body}</span>` : ''}
            ${e.reps ? `<span class="reps">${e.reps}</span>` : ''}
          </div>
        </div>
        ${hasDetail ? `<button class="expand-btn" tabindex="-1">▾</button>` : ''}
      </div>
      ${hasDetail ? `
      <div class="ex-body">
        ${e.desc ? `<div class="ex-desc">${e.desc}</div>` : ''}
        ${e.note ? `<div class="ex-note">${e.note}</div>` : ''}
        ${e.link ? `<a href="${e.link}" target="_blank" class="ex-link">觀看示範影片</a>` : ''}
      </div>` : ''}
    </div>`;
  }).join('');

  document.getElementById('mainContent').innerHTML = `
    <div class="photo-section" id="photoSection">
      <div class="photo-section-header">
        <div class="sec-label" style="margin-bottom:0">活動照片</div>
      </div>
      <div class="photo-content"></div>
    </div>
    <div class="youtube-section">
      <div class="sec-label">直播回放</div>
      <div class="youtube-grid">
        <div class="youtube-slot">
          <div class="yt-embed" id="ytEmbed1_${idx}"></div>
        </div>
        <div class="youtube-slot">
          <div class="yt-embed" id="ytEmbed2_${idx}"></div>
        </div>
      </div>
    </div>
    ${statsHtml}
    <div class="sec-label">暖身</div>
    <div class="special-row">開始前請先活動各關節進行暖身</div>
    <div class="sec-label">主訓練</div>
    <div class="exercise-grid">${exHtml}</div>
    <div class="stretch-card">🧘 收操伸展：訓練結束後請進行充分伸展，幫助肌肉放鬆與恢復。</div>
  `;
  renderYoutube(idx);
  renderPhotos(idx);  
}
function toggleEx(header) {
  const body = header.nextElementSibling;
  if (!body || !body.classList.contains('ex-body')) return;
  const btn = header.querySelector('.expand-btn');
  body.classList.toggle('open');
  if (btn) btn.classList.toggle('open');
}

function gotoSession(idx) {
  currentIdx = idx;
  document.querySelectorAll('.session-item').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });
  hideOverview();
  renderSession(idx);
  closeSidebar();
}

function navigate(dir) {
  const next = currentIdx + dir;
  if (next >= 0 && next < SESSIONS.length) gotoSession(next);
}

function showOverview() {
  document.getElementById('detailView').style.display = 'none';
  document.getElementById('overviewView').classList.add('active');
  renderOverview();
}

function hideOverview() {
  document.getElementById('detailView').style.display = 'block';
  document.getElementById('overviewView').classList.remove('active');
}

function renderOverview() {
  const maxEx = Math.max(...SESSIONS.map(s => s.exercises.length));
  const bars = [...SESSIONS].reverse().map((s, i) => {
    const origIdx = SESSIONS.length - 1 - i;
    const h = Math.round((s.exercises.length / maxEx) * 52);
    return `<div class="fc-bar-wrap" onclick="gotoSession(${origIdx})">
      <div class="fc-num">${s.exercises.length}</div>
      <div class="fc-bar ${origIdx === currentIdx ? 'active' : ''}" style="height:${h}px"></div>
      <div class="fc-label">${s.label}</div>
    </div>`;
  }).join('');

  const cards = SESSIONS.map((s, i) => {
    const bodies = getUniqBodies(s.exercises);
    return `<div class="ov-card" onclick="gotoSession(${i})">
      <div class="ov-date">${s.label}</div>
      <div class="ov-count">${s.exercises.length} 個動作 · 第 ${SESSIONS.length - i} 次</div>
      <div class="ov-tags">
        ${bodies.map(b => `<span class="tag ${getTagClass(b)}">${b || '綜合'}</span>`).join('')}
      </div>
    </div>`;
  }).join('');

  document.getElementById('overviewContent').innerHTML = `
    <div class="frequency-chart">
      <div class="fc-title">訓練紀錄 — 動作數量</div>
      <div class="fc-bars">${bars}</div>
    </div>
    <div class="sec-label">所有訓練</div>
    <div class="overview-grid">${cards}</div>
  `;
}

function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebarOverlay');
  sidebar.classList.toggle('open');
  if (overlay) overlay.classList.toggle('active', sidebar.classList.contains('open'));
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  const overlay = document.getElementById('sidebarOverlay');
  if (overlay) overlay.classList.remove('active');
}

// ── YOUTUBE MODULE（GitHub 資料驅動）────────────────────────────────────
// 使用方式：直接在上方 SESSIONS 陣列的每筆資料中填入 youtube 欄位，例如：
//   youtube: ["https://youtu.be/xxxxx", "https://youtu.be/yyyyy"]
// 縮圖：上傳至 GitHub repo 的 thumbnails/<日期>/ 資料夾，命名為 1.jpg / 2.jpg
//   例如：thumbnails/2026-04-24/1.jpg  thumbnails/2026-04-24/2.jpg
//   支援 jpg、jpeg、png、webp，找不到縮圖則顯示純色背景播放鈕。

// 從各種 YouTube URL 格式提取影片 ID
function toYoutubeVideoId(url) {
  if (!url) return '';
  const patterns = [
    /youtu\.be\/([^?&#/]+)/,
    /[?&]v=([^?&#]+)/,
    /youtube\.com\/embed\/([^?&#/]+)/,
    /youtube\.com\/live\/([^?&#/]+)/,
    /youtube\.com\/shorts\/([^?&#/]+)/,
  ];
  for (const re of patterns) {
    const m = url.match(re);
    if (m && m[1]) return m[1];
  }
  return '';
}

// 嘗試從 GitHub 載入縮圖（jpg → jpeg → png → webp）
function tryLoadThumb(dateKey, slot) {
  return new Promise(resolve => {
    const folder = dateKey.replace(/\//g, '-');
    const exts = ['jpg', 'jpeg', 'png', 'webp'];
    let i = 0;
    function tryNext() {
      if (i >= exts.length) { resolve(null); return; }
      const url = `https://raw.githubusercontent.com/${GH_USER}/${GH_REPO}/${GH_BRANCH}/thumbnails/${folder}/${slot + 1}.${exts[i]}`;
      const img = new Image();
      img.onload  = () => resolve(url);
      img.onerror = () => { i++; tryNext(); };
      img.src = url;
    }
    tryNext();
  });
}

async function renderYoutubeEmbed(idx, slot, url) {
  const embedId = slot === 0 ? `ytEmbed1_${idx}` : `ytEmbed2_${idx}`;
  const el = document.getElementById(embedId);
  if (!el) return;

  const videoId = toYoutubeVideoId(url);

  if (videoId) {
    // ★ 優先使用 thumbnails 欄位中的自訂縮圖
    const customThumb = (SESSIONS[idx].thumbnails || [])[slot];
    let thumbUrl = null;
    if (customThumb) {
      thumbUrl = customThumb;   // 直接使用自訂網址
    } else {
      thumbUrl = await tryLoadThumb(SESSIONS[idx].date, slot);  // fallback：GitHub 自動查找
    }
    const thumbHtml = thumbUrl
      ? `<img class="yt-facade-thumb" src="${thumbUrl}" alt="">`
      : '';
    el.innerHTML = `
      <div class="yt-facade" onclick="loadYoutubeIframe(this,'${videoId}')">
        ${thumbHtml}
        <div class="yt-play-btn"></div>
        <div class="yt-facade-label">點擊播放影片</div>
      </div>`;
  } else {
    el.innerHTML = `<div class="yt-embed-empty">▶</div>`;
  }
}

function loadYoutubeIframe(facade, videoId) {
  const parent = facade.parentElement;
  parent.innerHTML = `<iframe
    src="https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
    allowfullscreen referrerpolicy="strict-origin-when-cross-origin"
    style="position:absolute;inset:0;width:100%;height:100%;border:none;border-radius:6px">
  </iframe>`;
}

function renderYoutube(idx) {
  const urls = SESSIONS[idx].youtube || ['', ''];
  [0, 1].forEach(slot => {
    renderYoutubeEmbed(idx, slot, urls[slot] || '');
  });
}
// ── END YOUTUBE MODULE ────────────────────────────────────────────────────
  
// ── GITHUB PHOTO MODULE ───────────────────────────────────────────────────
// 設定：填入你的 GitHub 帳號與 repo 名稱
const GH_USER   = 'giayama';   // ← 填你的 GitHub 帳號
const GH_REPO   = 'FXGYM';         // ← 填你的 repo 名稱
const GH_BRANCH = 'main';                   // 預設分支，通常是 main 或 master
const MAX_PHOTOS = 4;                        // 每次活動最多張數

// raw.githubusercontent.com 圖片 URL
function ghPhotoUrl(dateKey, n, ext) {
  // dateKey 格式 "2026/04/24" → "2026-04-24"
  const folder = dateKey.replace(/\//g, '-');
  return `https://raw.githubusercontent.com/${GH_USER}/${GH_REPO}/${GH_BRANCH}/photos/${folder}/${n}.${ext}`;
}

function photoKey(idx) { return SESSIONS[idx].date; }

// 嘗試載入一張圖（jpg → jpeg → png → webp 順序）
function tryLoadPhoto(dateKey, n) {
  return new Promise(resolve => {
    const exts = ['jpg', 'jpeg', 'png', 'webp'];
    let i = 0;
    function tryNext() {
      if (i >= exts.length) { resolve(null); return; }
      const url = ghPhotoUrl(dateKey, n, exts[i]);
      const img = new Image();
      img.onload  = () => resolve({ url, n, ext: exts[i] });
      img.onerror = () => { i++; tryNext(); };
      img.src = url;
    }
    tryNext();
  });
}

async function renderPhotos(idx) {
  const section = document.getElementById('photoSection');
  if (!section) return;
  const key = photoKey(idx);
  const content = section.querySelector('.photo-content');
  const folder = key.replace(/\//g, '-');
  const ghFolderUrl = `https://github.com/${GH_USER}/${GH_REPO}/tree/${GH_BRANCH}/photos/${folder}`;

  // 設定未完成時顯示提示
  if (GH_USER === 'YOUR_GITHUB_USERNAME') {
    content.innerHTML = `
      <div class="photo-empty">
        <div class="photo-empty-icon">⚙️</div>
        <div class="photo-empty-text">請設定 GitHub 帳號與 repo 名稱</div>
        <div class="photo-empty-hint">編輯 HTML 頂部的 GH_USER 和 GH_REPO 變數</div>
      </div>`;
    return;
  }

  // 顯示載入中
  content.innerHTML = `
    <div class="photo-grid">
      ${Array(MAX_PHOTOS).fill('<div class="photo-cell-empty">…</div>').join('')}
    </div>`;

  // 並行嘗試載入所有照片
  const results = await Promise.all(
    Array.from({length: MAX_PHOTOS}, (_, i) => tryLoadPhoto(key, i + 1))
  );
  const loaded = results.filter(Boolean);

  if (loaded.length === 0) {
    content.innerHTML = `
      <div class="photo-empty">
        <div class="photo-empty-icon">📷</div>
        <div class="photo-empty-text">尚未上傳活動照片</div>
        <div class="photo-empty-hint">上傳至 GitHub: photos/${folder}/1.jpg … 4.jpg</div>
      </div>`;
    updateSidebarAlbumDot(idx, false);
    return;
  }

  // 快取載入結果，供燈箱使用
  loadedPhotos[idx] = loaded;

  // 渲染照片格
  const cells = Array.from({length: MAX_PHOTOS}, (_, i) => {
    const photo = loaded.find(p => p.n === i + 1);
    if (photo) {
      const urlIdx = loaded.indexOf(photo);
      return `<div class="photo-cell" onclick="openLightbox(${urlIdx}, ${idx})">
        <img src="${photo.url}" alt="活動照片 ${i+1}" loading="lazy">
      </div>`;
    }
    return `<div class="photo-cell-empty">＋</div>`;
  }).join('');

  content.innerHTML = `
    <div class="photo-grid">${cells}</div>
    <div class="photo-status">
      ${loaded.length} / ${MAX_PHOTOS} 張
      &nbsp;·&nbsp;
      <a href="${ghFolderUrl}" target="_blank">在 GitHub 管理照片 ↗</a>
    </div>`;

  updateSidebarAlbumDot(idx, true);
}

// ── 燈箱 ──────────────────────────────────────────────────────────────────
const loadedPhotos = {};
let lbIdx = 0, lbSessionIdx = 0;

function openLightbox(urlIdx, sessionIdx) {
  lbSessionIdx = sessionIdx;
  const photos = loadedPhotos[sessionIdx] || [];
  if (!photos.length) return;
  lbIdx = Math.max(0, Math.min(urlIdx, photos.length - 1));
  updateLightbox();
  const lb = document.getElementById('lightbox');
  lb.style.display = 'flex';
  requestAnimationFrame(() => lb.classList.add('open'));
  document.addEventListener('keydown', lbKeyHandler);
}

function updateLightbox() {
  const photos = loadedPhotos[lbSessionIdx] || [];
  if (!photos.length) return;
  document.getElementById('lightboxImg').src = photos[lbIdx].url;
  document.getElementById('lightboxCaption').textContent =
    `${SESSIONS[lbSessionIdx].label}　${lbIdx + 1} / ${photos.length}`;
  document.querySelector('.lightbox-prev').style.display = photos.length > 1 ? 'flex' : 'none';
  document.querySelector('.lightbox-next').style.display = photos.length > 1 ? 'flex' : 'none';
}

function closeLightbox(e) {
  if (e && e.target.closest('.lightbox-img')) return;
  if (e && e.target.closest('.lightbox-nav')) return;
  const lb = document.getElementById('lightbox');
  lb.classList.remove('open');
  setTimeout(() => { lb.style.display = 'none'; }, 200);
  document.removeEventListener('keydown', lbKeyHandler);
}

function lbNav(dir, e) {
  if (e) { e.stopPropagation(); e.preventDefault(); }
  const photos = loadedPhotos[lbSessionIdx] || [];
  if (!photos.length) return;
  lbIdx = (lbIdx + dir + photos.length) % photos.length;
  updateLightbox();
}

function lbKeyHandler(e) {
  if (e.key === 'Escape')     closeLightbox();
  if (e.key === 'ArrowLeft')  lbNav(-1);
  if (e.key === 'ArrowRight') lbNav(1);
}

function updateSidebarAlbumDot(idx, hasPhotos) {
  const item = document.getElementById(`si-${idx}`);
  if (!item) return;
  let dot = item.querySelector('.album-dot');
  if (hasPhotos && !dot) {
    dot = document.createElement('span');
    dot.className = 'album-dot'; dot.title = '有照片';
    item.querySelector('.session-date').appendChild(dot);
  } else if (!hasPhotos && dot) {
    dot.remove();
  }
}
// ── END GITHUB PHOTO MODULE ────────────────────────────────────────────────

// Init
renderSidebar();
renderSession(0);
</script>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <button class="lightbox-nav lightbox-prev" onclick="lbNav(-1,event)">‹</button>
  <img class="lightbox-img" id="lightboxImg" src="" alt="活動照片">
  <button class="lightbox-nav lightbox-next" onclick="lbNav(1,event)">›</button>
  <div class="lightbox-caption" id="lightboxCaption"></div>
</div>
